services:
  # ─────────────────────────────────────────────
  # TrenchLaw Agent (one-shot query)
  #   docker compose -f docker/docker-compose.yml run --rm trenchlaw-agent -m "Hello"
  # ─────────────────────────────────────────────
  trenchlaw-agent:
    image: docker.io/sipeed/trenchlaw:latest
    container_name: trenchlaw-agent
    profiles:
      - agent
    # Uncomment to access host network; leave commented unless needed.
    #extra_hosts:
    #  - "host.docker.internal:host-gateway"
    volumes:
      - ./data:/root/.trenchlaw
    entrypoint: ["trenchlaw", "agent"]
    stdin_open: true
    tty: true

  # ─────────────────────────────────────────────
  # TrenchLaw Gateway (Long-running Bot)
  #   docker compose -f docker/docker-compose.yml --profile gateway up
  # ─────────────────────────────────────────────
  trenchlaw-gateway:
    image: docker.io/sipeed/trenchlaw:latest
    container_name: trenchlaw-gateway
    restart: on-failure
    profiles:
      - gateway
    # Uncomment to access host network; leave commented unless needed.
    #extra_hosts:
    #  - "host.docker.internal:host-gateway"
    volumes:
      - ./data:/root/.trenchlaw

  # ─────────────────────────────────────────────
  # TrenchLaw Launcher (Web Console + Gateway)
  #   docker compose -f docker/docker-compose.yml --profile launcher up
  # ─────────────────────────────────────────────
  trenchlaw-launcher:
    image: docker.io/sipeed/trenchlaw:launcher
    container_name: trenchlaw-launcher
    restart: on-failure
    profiles:
      - launcher
    environment:
      - TRENCHLAW_GATEWAY_HOST=0.0.0.0
    ports:
      - "127.0.0.1:18800:18800"
      - "127.0.0.1:18790:18790"
    volumes:
      - ./data:/root/.trenchlaw
