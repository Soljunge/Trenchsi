services:
  # ─────────────────────────────────────────────
  # TrenchLaw Agent (one-shot query) - Full MCP Support
  #   docker compose -f docker/docker-compose.full.yml run --rm trenchlaw-agent -m "Hello"
  # ─────────────────────────────────────────────
  trenchlaw-agent:
    build:
      context: ..
      dockerfile: docker/Dockerfile.full
    container_name: trenchlaw-agent-full
    profiles:
      - agent
    volumes:
      - ../config/config.json:/root/.trenchlaw/config.json:ro
      - trenchlaw-workspace:/root/.trenchlaw/workspace
      - trenchlaw-npm-cache:/root/.npm # npm cache for faster MCP server installs
    entrypoint: ["trenchlaw", "agent"]
    stdin_open: true
    tty: true

  # ─────────────────────────────────────────────
  # TrenchLaw Gateway (Long-running Bot) - Full MCP Support
  #   docker compose -f docker/docker-compose.full.yml --profile gateway up
  # ─────────────────────────────────────────────
  trenchlaw-gateway:
    build:
      context: ..
      dockerfile: docker/Dockerfile.full
    container_name: trenchlaw-gateway-full
    restart: unless-stopped
    profiles:
      - gateway
    volumes:
      # Configuration file
      - ../config/config.json:/root/.trenchlaw/config.json:ro
      # Persistent workspace (sessions, memory, logs)
      - trenchlaw-workspace:/root/.trenchlaw/workspace
      # NPM cache for faster MCP server installs
      - trenchlaw-npm-cache:/root/.npm
    command: ["gateway"]

volumes:
  trenchlaw-workspace:
  trenchlaw-npm-cache: # Cache npm packages to speed up MCP server installations
